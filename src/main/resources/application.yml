server:
  port: 8080

spring:
  profiles:
    active: local #?? ???? ???

  config:
    import: optional:file:.env[.properties] # ???? .env ?? ??

  output:
    ansi:
      enabled: always # ANSI ?? ?? ??? (JUnit ??? ??)

  web:
    resources:
      add-mappings: false # ?? ??? ?? ?? ?? false

  servlet:
    multipart:
      max-file-size: 10MB #?? ?? ??
      max-request-size: 30MB #?? ?? ??

  jpa:
    hibernate:
      ddl-auto: update # ??? ?? ? ???? ?? (create, create-drop, update, validate, none)
    defer-datasource-initialization: true # DataSource ??? ??
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect # Hibernate Dialect ??
        format_sql: true # SQL ???
        highlight_sql: true # SQL ????? ??
        use_sql_comments: true # JPQL SQL ?? ??
        default_batch_fetch_size: 100 # ?? ?? ?? ??
  sql:
    init:
      mode: embedded # SQL ??? ?? (always, never, embedded, embedded-always)

app:
  props:
    social:
      kakao:
        client-id: ${KAKAO_CLIENT_ID}
        client-secret: ${KAKAO_CLIENT_SECRET}
        authorization-uri: https://kauth.kakao.com/oauth/authorize
        token-uri: https://kauth.kakao.com/oauth/token
        user-info-uri: https://kapi.kakao.com/v2/user/me
        user-info-name-attribute-key: id
        client-name: Kakao
      naver:
        client-id: ${NAVER_CLIENT_ID}
        client-secret: ${NAVER_CLIENT_SECRET}
        redirect-uri: ${NAVER_REDIRECT_URI}
        authorization-uri: https://nid.naver.com/oauth2.0/authorize
        token-uri: https://nid.naver.com/oauth2.0/token
        user-info-uri: https://openapi.naver.com/v1/nid/me
        user-info-name-attribute-key: response
        client-name: Naver
#      google:
#        client-id: ${GOOGLE_CLIENT_ID}
#        client-secret: ${GOOGLE_CLIENT_SECRET}
#        redirect-uri: ${GOOGLE_REDIRECT_URI}
#        authorization-uri: https://accounts.google.com/o/oauth2/auth
#        token-uri: https://oauth2.googleapis.com/token
#        user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
#        user-info-name-attribute-key: sub
#        client-name: Google
    jwt:
      secret-key: 1234567890123456789012345678901234567890
      access-token-expiration-period: 150 # ???, 15?, ???? ?? 150?
      refresh-token-expiration-period: 1440 # 24?? 60 * 24 = 1440?

    aws:
      key:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}
      s3:
        bucket-name: ${AWS_S3_BUCKET_NAME}
        region: ${AWS_REGION}

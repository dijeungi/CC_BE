name: Build and Push Docker Images
 
on:
  push:
    branches:
      - yeon # backend 브랜치에 푸시될 때 실행
jobs:
  build_and_push: 
    runs-on: ubuntu-latest

    steps:
      # 1. DockerHub 로그인
      - name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. Checkout 코드
      - name: Checkout repository
        uses: actions/checkout@v3

      # 3. Backend Docker 이미지 빌드 및 푸시
      - name: Build Backend Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cc-backend .
      - name: Push Backend Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/cc-backend

  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Docker pull and run
        uses: appleboy/ssh-action@master
        with:
          username: ubuntu
          host: ${{ secrets.EC2_HOST_IP }}
          key: ${{ secrets.SSH_KEY }}
          script: | #fi = 여기가 if의 끝이다
            if [ "$(sudo docker ps -a -q -f name=cc-backend)" ]; then
              sudo docker rm -f dockerbackend
            fi
            if [ "$(sudo docker images -q ${{ secrets.DOCKERHUB_USERNAME }}/cc-backend)" ]; then
              sudo docker rmi -f ${{ secrets.DOCKERHUB_USERNAME }}/cc-backend
            fi
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/cc-backend
            sudo docker run -d -p 8080:8080 --name cc-backend --add-host=host.docker.internal:172.17.0.1 ${{ secrets.DOCKERHUB_USERNAME }}/cc-backend

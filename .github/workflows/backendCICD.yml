name: Build and Push Docker Images

on:
  push:
    branches:
      - dev # backend 브랜치에 푸시될 때 실행

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
    # 1. DockerHub 로그인
      - name: Login to DockerHub
        uses: docker/login-action@v1 # 템플릿@버전
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 2. Checkout 코드
      - name: Checkout repository
        uses: actions/checkout@v3

    # 3. MySQL Docker 이미지 빌드 및 푸시
      - name: Build MySQL Docker image
        working-directory: db # github에 있는 docker_db 폴더로 이동
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cc-db .

      - name: Push MySQL Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/cc-db

    # 4. Backend Docker 이미지 빌드 및 푸시
      - name: Build Backend Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cc-backend .

      - name: Push Backend Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/cc-backend

  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Docker pull and run
        uses: appleboy/ssh-action@master # aws ec2 ssh에 접속해주는 템플릿
        with:
          username: ubuntu
          host: ${{ secrets.EC2_HOST_IP }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            if [ "$(sudo docker ps -a -q -f name=cc-db)" ]; then
              sudo docker rm -f cc-db
            fi
            if [ "$(sudo docker ps -a -q -f name=cc-backend)" ]; then
              sudo docker rm -f cc-backend
            fi
            if [ "$(sudo docker images -q ${{ secrets.DOCKERHUB_USERNAME }}/cc-db)" ]; then
              sudo docker rmi -f ${{ secrets.DOCKERHUB_USERNAME }}/cc-db
            fi
            if [ "$(sudo docker images -q ${{ secrets.DOCKERHUB_USERNAME }}/cc-backend)" ]; then
              sudo docker rmi -f ${{ secrets.DOCKERHUB_USERNAME }}/cc-backend
            fi
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/cc-db
            sudo docker run -d -p 3308:3306 --name cc-db -v db_volume:/var/lib/mysql ${{ secrets.DOCKERHUB_USERNAME }}/cc-db
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/cc-backend
            sudo docker run -d -p 8080:8080 --name cc-backend --add-host=host.docker.internal:172.17.0.1 --env-file /home/ubuntu/.env -v /home/ubuntu/serviceAccountKey.json:/app/serviceAccountKey.json ${{ secrets.DOCKERHUB_USERNAME }}/cc-backend
